name: Process HS 440220 dataset

on:
  push:
    paths:
      - '.github/workflows/process-hs440220.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build import panels
        shell: bash
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          src = Path('tmp_hs440220.csv')
          rows = list(csv.DictReader(src.open(encoding='utf-8-sig')))
          excluded = {'ASEAN', 'EU-28'}
          imports = []
          for r in rows:
              if r['Flow'] != 'Import' or r['Country or Area'] in excluded:
                  continue
              if r['Year'] not in {'2022','2023','2024'}:
                  continue
              imports.append(r)

          with Path('tmp_hs440220_imports_2022_2024.csv').open('w', newline='', encoding='utf-8') as f:
              fields = ['Country or Area','Year','Trade (USD)','Weight (kg)','Quantity Name','Quantity']
              w = csv.DictWriter(f, fieldnames=fields)
              w.writeheader()
              for r in sorted(imports, key=lambda x:(x['Country or Area'], int(x['Year']))):
                  w.writerow({k:r.get(k,'') for k in fields})

          by_country = {}
          for r in imports:
              c = r['Country or Area']
              y = int(r['Year'])
              try: value = float(r['Trade (USD)'] or 0)
              except: value = 0.0
              weight_txt = r['Weight (kg)'] or r['Quantity'] or ''
              try: weight = float(weight_txt or 0)
              except: weight = 0.0
              by_country.setdefault(c, {})[y] = (value, weight)

          top = sorted(by_country, key=lambda c: by_country[c].get(2024,(0,0))[0], reverse=True)[:20]
          fields = ['Rank','Country','Import Value 2022 USD','Import Volume 2022 kg','Import Value 2023 USD','Import Volume 2023 kg','Import Value 2024 USD','Import Volume 2024 kg']
          with Path('tmp_hs440220_top20.csv').open('w', newline='', encoding='utf-8') as f:
              w=csv.writer(f)
              w.writerow(fields)
              for i,c in enumerate(top,1):
                  row=[i,c]
                  for y in (2022,2023,2024):
                      v,q=by_country[c].get(y,('', ''))
                      row += [v,q]
                  w.writerow(row)
          print('top20', top)
          PY
      - name: Commit processed files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tmp_hs440220_imports_2022_2024.csv tmp_hs440220_top20.csv
          git commit -m 'Process temporary HS 440220 import dataset' || exit 0
          git push
