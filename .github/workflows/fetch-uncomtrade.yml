name: Fetch UN Comtrade HS 440220

on:
  push:
    paths:
      - '.github/workflows/fetch-uncomtrade.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and extract UNdata CSV
        shell: bash
        run: |
          python - <<'PY'
          import io, urllib.request, zipfile, pathlib
          url = 'https://data.un.org/Handlers/DownloadHandler.ashx?DataFilter=_l1Code%3A45%3BcmdCode%3A440220&DataMartId=ComTrade&Format=csv'
          req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=120) as r:
              payload = r.read()
          z = zipfile.ZipFile(io.BytesIO(payload))
          names = [n for n in z.namelist() if n.lower().endswith('.csv')]
          if not names:
              raise RuntimeError(f'No CSV in archive: {z.namelist()}')
          pathlib.Path('tmp_hs440220.csv').write_bytes(z.read(names[0]))
          print('saved', names[0], len(payload))
          PY
      - name: Commit dataset
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tmp_hs440220.csv
          git commit -m 'Fetch temporary UNdata HS 440220 dataset' || exit 0
          git push
